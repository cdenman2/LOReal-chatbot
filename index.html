<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L'Oréal Chatbot</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>L’ORÉAL</h1>
      <p>Smart Routine & Product Advisor</p>
    </header>

    <main class="chat-container">
      <div id="chat-box" class="chat-box">
        <div class="message assistant">
          <div class="label">L’Oréal Advisor</div>
          <div class="bubble">
            Hello! I can help with L’Oréal skincare, haircare, makeup, and beauty routines.
          </div>
        </div>
      </div>

      <div class="input-area">
        <input
          type="text"
          id="user-input"
          placeholder="Ask me about any L’Oréal product or routine..."
        >
        <button id="send-btn">Send</button>
      </div>
    </main>

    <footer class="footer">
      <p>© 2026 L’Oréal-inspired student project</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
