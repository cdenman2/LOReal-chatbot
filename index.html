<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L'Oréal Chatbot</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page">

    <header class="header">
      <h1>L’ORÉAL</h1>
      <p class="motto">"Because We’re All Worth It"</p>

      <div class="logo-wrap top-logo-wrap">
        <img src="./images/loreal-logo.jpg" alt="L'Oréal Logo" class="logo top-logo">
      </div>

      <p class="subtitle">Smart Routine &amp; Product Advisor</p>
    </header>

    <div class="product-banner" aria-label="Beauty products image"></div>

    <main class="chat-container">
      <div id="chat-box" class="chat-box">
        <div class="message assistant">
          <div class="label assistant-label">L’Oréal Advisor</div>
          <div class="bubble">
            Hello! I can help with L’Oréal skincare, haircare, makeup, and beauty routines.
          </div>
        </div>
      </div>

      <div class="input-area">
        <input
          type="text"
          id="user-input"
          placeholder="Ask me about any L’Oréal product or routine..."
        >
        <button id="send-btn">Send</button>
      </div>
    </main>

    <div class="product-banner-bottom" aria-label="Beauty products image"></div>

    <div class="logo-wrap bottom-logo-wrap">
      <img src="./images/loreal-logo.png" alt="L'Oréal Logo Bottom" class="logo bottom-logo">
    </div>

    <footer class="footer">
      <p>© 2026 L’Oréal-inspired student project</p>
    </footer>

  </div>

  <script src="./script.js"></script>
</body>
</html>
